<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPECTRO PROTOCOL</title>

  <!-- CSS DO TEMA -->
  <link id="theme-stylesheet" rel="stylesheet" href="style.css">

  <style>
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      opacity: 0;
      transform: translateY(40px);
      transition: 1s ease;
    }

    .hero.show {
      opacity: 1;
      transform: translateY(0);
    }

    .hero h1 {
      font-size: 80px;
      line-height: 1.02;
      padding-bottom: 6px;
      background: linear-gradient(90deg, #38bdf8, #60a5fa, #38bdf8);
      background-size: 200%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: glowText 6s linear infinite;
    }

    @keyframes glowText {
      0% {
        background-position: 0%
      }

      100% {
        background-position: 200%
      }
    }

    .hero p {
      margin-top: 20px;
      font-size: 22px;
      color: #94a3b8;
    }

    .cta {
      margin-top: 40px;
      padding: 14px 30px;
      border-radius: 12px;
      border: 1px solid #38bdf8;
      background: transparent;
      color: #38bdf8;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    .cta:hover {
      background: #38bdf8;
      color: #020617;
      box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
    }

    .particles {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
    }

    .dot {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #38bdf8;
      border-radius: 50%;
      opacity: 0.3;
      animation: float 12s linear infinite;
    }

    @keyframes float {
      from {
        transform: translateY(100vh);
      }

      to {
        transform: translateY(-10vh);
      }
    }
  </style>
</head>

<body>

  <div class="particles" id="particles"></div>

  <header>
    <a href="index.html" class="logo">SPECTRO</a>

    <nav>
      <ul>
        <li><a href="about.html">About</a></li>
        <li><a href="content.html">Intents</a></li>
        <li><a href="contact.html">Contact</a></li>

        <!-- BOTÃO TEMA -->
        <li>
          <button id="theme-toggle" class="theme-toggle" aria-pressed="false" type="button">
            <svg class="icon icon-sun" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="4" />
            </svg>

            <svg class="icon icon-moon" viewBox="0 0 24 24">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" />
            </svg>

            <span class="visually-hidden">Alternar tema</span>
          </button>
        </li>
      </ul>
    </nav>
  </header>

  <section class="hero" id="hero">
    <h1>SPECTRO Protocol</h1>
    <p>Next-generation cross-chain intent engine powered by EIP-712 <br>typed signatures and verifiable state
      proofs.</br></p>

    <button class="cta" onclick="scrollToContent()">
      Explore Intents
    </button>
  </section>

  <footer>© 2026 - KawanDias</footer>

  <script>
    /* ANIMA HERO */
    window.addEventListener('load', () => {
      document.getElementById('hero').classList.add('show');
    });

    /* BOTÃO CTA */
    function scrollToContent() {
      window.location.href = "content.html";
    }

    /* PARTÍCULAS */
    const container = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.animationDuration = (8 + Math.random() * 8) + 's';
      dot.style.opacity = Math.random();
      container.appendChild(dot);
    }
  </script>

  <!-- THEME TOGGLE -->
  <script>
    (function () {
      const link = document.getElementById('theme-stylesheet');
      const btn = document.getElementById('theme-toggle');

      function applyTheme(file) {
        if (!link) return;

        link.setAttribute('href', file);
        localStorage.setItem('theme', file);

        const isLight = file === 'style.light.css';

        if (btn) {
          btn.classList.toggle('is-light', isLight);
          btn.setAttribute('aria-pressed', isLight);
        }
      }

      function toggleTheme() {
        if (!link) return;

        const current = link.getAttribute('href') || 'style.css';
        const next = current.includes('style.light.css')
          ? 'style.css'
          : 'style.light.css';

        applyTheme(next);
      }

      const saved = localStorage.getItem('theme');
      if (saved) applyTheme(saved);
      else applyTheme('style.css');

      if (btn) btn.addEventListener('click', toggleTheme);
    })();
  </script>

</body>

</html>
